<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <style>
        /* ---- Reset & Base ---- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            color: #2d3748;
            min-height: 100vh;
        }

        /* ---- Header ---- */
        header {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            padding: 24px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        header h1 { font-size: 1.8rem; font-weight: 700; }
        header p  { font-size: 0.9rem; opacity: 0.85; margin-top: 4px; }

        /* ---- Main layout ---- */
        main {
            max-width: 960px;
            margin: 36px auto;
            padding: 0 20px;
        }

        /* ---- Card ---- */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 32px;
            margin-bottom: 32px;
        }
        .card h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a73e8;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e8f0fe;
        }

        /* ---- Form ---- */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group.full-width { grid-column: 1 / -1; }
        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #4a5568;
        }
        input, select {
            padding: 10px 14px;
            border: 1.5px solid #cbd5e0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
        }
        .btn-submit {
            margin-top: 8px;
            padding: 12px 32px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-submit:hover  { background: #1558c0; }
        .btn-submit:active { transform: scale(0.98); }

        /* ---- Alert Messages ---- */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            display: none;
        }
        .alert.success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #43a047; }
        .alert.error   { background: #fce8e8; color: #c62828; border-left: 4px solid #e53935; }
        .alert.show    { display: block; }

        /* ---- Table ---- */
        .table-wrapper { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        thead th {
            background: #1a73e8;
            color: white;
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
        }
        thead th:first-child { border-radius: 8px 0 0 0; }
        thead th:last-child  { border-radius: 0 8px 0 0; }
        tbody tr { border-bottom: 1px solid #e2e8f0; transition: background 0.15s; }
        tbody tr:hover { background: #f7faff; }
        tbody td { padding: 12px 16px; color: #4a5568; }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            background: #e8f0fe;
            color: #1a73e8;
        }
        .empty-msg {
            text-align: center;
            padding: 30px;
            color: #a0aec0;
            font-style: italic;
        }
        
        /* ---- Action Buttons ---- */
        .btn-delete {
            background: #ffebeb;
            color: #d32f2f;
            border: 1px solid #ffcdd2;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-delete:hover {
            background: #d32f2f;
            color: white;
        }

        /* ---- Count badge ---- */
        .count { 
            display: inline-block; 
            background: #e8f0fe; 
            color: #1a73e8; 
            border-radius: 20px; 
            padding: 2px 10px; 
            font-size: 0.8rem; 
            font-weight: 600; 
            margin-left: 8px; 
        }
    </style>
</head>
<body>

<header>
    <h1>🎓 Student Management System</h1>
    <p>Register students and view all records</p>
</header>

<main>

    <!-- ===== REGISTRATION FORM ===== -->
    <div class="card">
        <h2>📋 Student Registration Form</h2>

        <!-- Alert messages -->
        <div id="successAlert" class="alert success"></div>
        <div id="errorAlert"   class="alert error"></div>

        <div class="form-grid">
            <div class="form-group">
                <label for="name">Full Name <span style="color:red">*</span></label>
                <input type="text" id="name" placeholder="e.g. Aditya Kumar" />
            </div>
            <div class="form-group">
                <label for="email">Email Address <span style="color:red">*</span></label>
                <input type="email" id="email" placeholder="e.g. aditya@example.com" />
            </div>
            <div class="form-group">
                <label for="course">Course <span style="color:red">*</span></label>
                <select id="course">
                    <option value="">-- Select a Course --</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Information Technology">Information Technology</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Mechanical Engineering">Mechanical Engineering</option>
                    <option value="Civil Engineering">Civil Engineering</option>
                    <option value="Data Science">Data Science</option>
                    <option value="Artificial Intelligence">Artificial Intelligence</option>
                </select>
            </div>
            <div class="form-group" style="justify-content: flex-end;">
                <label>&nbsp;</label>
                <button class="btn-submit" onclick="submitStudent()">➕ Submit Registration</button>
            </div>
        </div>
    </div>

    <!-- ===== STUDENT LIST TABLE ===== -->
    <div class="card">
        <h2>📊 Registered Students <span class="count" id="studentCount">0</span></h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Course</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <!-- Rows populated by JavaScript via REST API -->
                </tbody>
            </table>
        </div>
    </div>

</main>

<script>
    // ============================================================
    // Fetch and render all students from GET /api/students
    // ============================================================
    async function loadStudents() {
        try {
            const response = await fetch('/api/students');
            const students = await response.json();

            const tbody = document.getElementById('studentTableBody');
            const countBadge = document.getElementById('studentCount');
            countBadge.textContent = students.length;

            if (students.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="empty-msg">No students registered yet. Be the first!</td></tr>`;
                return;
            }

            tbody.innerHTML = students.map(s => `
                <tr>
                    <td><strong>#${s.id}</strong></td>
                    <td>${escapeHtml(s.name)}</td>
                    <td>${escapeHtml(s.email)}</td>
                    <td><span class="badge">${escapeHtml(s.course)}</span></td>
                    <td><button class="btn-delete" onclick="deleteStudent(${s.id})">🗑️ Delete</button></td>
                </tr>
            `).join('');

        } catch (err) {
            console.error('Failed to load students:', err);
        }
    }

    // ============================================================
    // Submit new student via POST /api/students
    // ============================================================
    async function submitStudent() {
        const name   = document.getElementById('name').value.trim();
        const email  = document.getElementById('email').value.trim();
        const course = document.getElementById('course').value.trim();

        // Client-side validation
        if (!name || !email || !course) {
            showAlert('error', '⚠️ All fields are required. Please fill in Name, Email, and Course.');
            return;
        }

        const student = { name, email, course };

        try {
            const response = await fetch('/api/students', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(student)
            });

            const data = await response.json();

            if (response.ok) {
                showAlert('success', `✅ ${data.message} Welcome, ${name}!`);
                // Clear form fields
                document.getElementById('name').value  = '';
                document.getElementById('email').value = '';
                document.getElementById('course').value = '';
                // Refresh student list
                await loadStudents();
            } else {
                showAlert('error', `❌ ${data.error}`);
            }

        } catch (err) {
            showAlert('error', '❌ Network error. Please ensure the server is running.');
        }
    }

    // ============================================================
    // Delete student via DELETE /api/students/{id}
    // ============================================================
    async function deleteStudent(id) {
        if (!confirm('Are you sure you want to delete this student?')) {
            return;
        }

        try {
            const response = await fetch(`/api/students/${id}`, {
                method: 'DELETE'
            });

            const data = await response.json();

            if (response.ok) {
                showAlert('success', `✅ ${data.message}`);
                await loadStudents();
            } else {
                showAlert('error', `❌ ${data.error}`);
            }
        } catch (err) {
            showAlert('error', '❌ Network error. Please ensure the server is running.');
        }
    }

    // ============================================================
    // Utility: Show alert message
    // ============================================================
    function showAlert(type, message) {
        const successEl = document.getElementById('successAlert');
        const errorEl   = document.getElementById('errorAlert');

        // Hide both first
        successEl.classList.remove('show');
        errorEl.classList.remove('show');

        if (type === 'success') {
            successEl.textContent = message;
            successEl.classList.add('show');
            setTimeout(() => successEl.classList.remove('show'), 5000);
        } else {
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => errorEl.classList.remove('show'), 5000);
        }
    }

    // ============================================================
    // Utility: Prevent XSS
    // ============================================================
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    // ============================================================
    // Load students on page load
    // ============================================================
    window.onload = loadStudents;

    // Allow Enter key to submit the form
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submitStudent();
    });
</script>

</body>
</html>
